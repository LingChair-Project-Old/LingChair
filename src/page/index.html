<!doctype html>
<html lang="zh-CN" class="mdui-theme-auto">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no" />
  <meta name="renderer" content="webkit" />

  <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css"/>
  <script crossorigin src="https://unpkg.com/mdui@2/mdui.global.js"></script>

  <script crossorigin src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <link rel="stylesheet" href="index.css"/>
  <link rel="icon" href="res/icon.ico"/>

  <title>铃之椅</title>
</head>

<body>
  <div id="app"></div>
  <script src="extra.js"></script>
  <script src="events.js"></script>
  <script>
    ;(function () {
        var src = './static/eruda.min.js';
        if (!/eruda=true/.test(window.location) && localStorage.getItem('active-eruda') != 'true') return;
        document.write('<scr' + 'ipt src="' + src + '"></scr' + 'ipt>');
        document.write('<scr' + 'ipt>eruda.init();</scr' + 'ipt>');
    })();
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script>
    ;(async () => ReactDOM.createRoot(document.getElementById('app')).render((await requireES6((await requireES6('../utils.js')).isMobile() ? './layout/MainPhone.js' : './layout/MainPC.js'))()))()
  </script>
</body>

</html>
